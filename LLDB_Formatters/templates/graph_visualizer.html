<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pretty LLDB — Graph Visualizer</title>
    <style>
      __SHARED_CSS__ body {
        padding: 0;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <button
      id="toggle-info-btn"
      onclick="toggleInfoBox()"
      title="Show Info Panel"
      aria-label="Toggle graph controls"
    >
      ⚙
    </button>

    <div id="info-box" class="hidden" role="complementary" aria-label="Graph controls">
      <!-- Gradient accent bar -->
      <div class="panel-accent panel-accent--graph"></div>

      <!-- Header -->
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="panel-title">Graph Visualizer</span>
          <span class="panel-badge panel-badge--graph">GRAPH</span>
        </div>
        <button id="theme-toggle-btn" class="icon-btn" onclick="toggleTheme()"></button>
      </div>

      <!-- Type info injected by Python -->
      <div class="stats-display type-info-display">__TYPE_INFO_HTML__</div>

      <!-- View Operations -->
      <div class="controls-section">
        <div class="section-title">View</div>
        <div class="button-group">
          <button id="btn-center" class="button" onclick="centerView()">Center</button>
          <button id="btn-clear" class="button" onclick="clearSelection()">Clear</button>
        </div>
      </div>

      <!-- Layout -->
      <div class="controls-section layout-controls">
        <div class="section-title">Layout</div>
        <div class="button-group">
          <button class="button active" onclick="setLayout('physics')" id="physics-btn">
            Physics
          </button>
          <button class="button" onclick="setLayout('hierarchical')" id="hierarchical-btn">
            Hierarchical
          </button>
          <button class="button" onclick="setLayout('radial')" id="radial-btn">Radial</button>
        </div>
      </div>

      <!-- Search -->
      <div class="controls-section search-controls">
        <div class="section-title">Search</div>
        <input
          type="text"
          class="search-box"
          id="search-input"
          placeholder="Search node values…"
          autocomplete="off"
          spellcheck="false"
          oninput="searchNodes(this.value)"
        />
        <div class="button-group" style="margin-top: 8px">
          <button class="button" onclick="clearHighlights()">Clear Search</button>
        </div>
      </div>

      <!-- Statistics -->
      <div class="stats-display" id="stats-display">
        <div class="section-title">Statistics</div>
        <div id="graph-stats"></div>
      </div>

      <!-- Selected node info -->
      <div class="node-info" id="node-info" style="display: none">
        <div class="section-title">Selected Node</div>
        <div id="node-details"></div>
      </div>

      <!-- Connected Nodes -->
      <div class="connected-nodes" id="connected-nodes" style="display: none">
        <div class="section-title">Connected Nodes</div>
        <div id="connected-list"></div>
      </div>

      <!-- Legend -->
      <div class="legend">
        <div class="section-title">Legend</div>
        <div class="legend-item">
          <div class="legend-color" style="background: #7aa2f7"></div>
          <span>Normal</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #bb9af7"></div>
          <span>Selected</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #f7768e"></div>
          <span>Search</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #e0af68"></div>
          <span>Connected</span>
        </div>
      </div>

      <!-- Export -->
      <div class="controls-section export-controls">
        <div class="section-title">Export</div>
        <div class="button-group">
          <button id="btn-png" class="button" onclick="exportPNG()">PNG</button>
          <button id="btn-json" class="button" onclick="customExportJSON()">JSON</button>
        </div>
      </div>
    </div>
    <!-- /#info-box -->

    <div id="mynetwork"></div>

    <script type="text/javascript">
      __VISJS_LIBRARY__;
    </script>
    <script type="text/javascript">
      __SHARED_JS__;
    </script>
    <script type="text/javascript">
      // ----- Data from Python ----- //
      const rawNodesData = __NODES_DATA__;
      const rawEdgesData = __EDGES_DATA__;
      const isDirected = __GRAPH_DIRECTED__;

      // ----- State ----- //
      let network;
      let currentLayout = 'physics';

      const processedNodes = rawNodesData.map((node) => ({
        id: node.id,
        label: String(node.label),
        title: node.title,
        originalData: node,
      }));

      const processedEdges = rawEdgesData.map((edge) => ({
        ...edge,
        arrows: edge.directed ? { to: { enabled: true, scaleFactor: 1 } } : {},
        smooth: edge.directed ? { type: 'dynamic' } : false,
      }));

      const nodes = new vis.DataSet(processedNodes);
      const edges = new vis.DataSet(processedEdges);
      const data = { nodes, edges };
      const container = document.getElementById('mynetwork');

      // ----- Layout configurations ----- //
      const layoutConfigs = {
        physics: {
          physics: {
            enabled: true,
            barnesHut: {
              gravitationalConstant: -8000,
              centralGravity: 0.5,
              springLength: 150,
              springConstant: 0.05,
              nodeDistance: 100,
              damping: 0.05,
              avoidOverlap: 1,
            },
          },
        },
        hierarchical: {
          layout: {
            hierarchical: {
              enabled: true,
              sortMethod: 'hubsize',
              direction: 'UD',
              nodeSpacing: 150,
              levelSeparation: 170,
              parentCentralization: true,
              edgeMinimization: true,
            },
          },
          physics: { enabled: false },
        },
        radial: {
          layout: { randomSeed: 2 },
          physics: {
            enabled: true,
            barnesHut: {
              gravitationalConstant: -5000,
              centralGravity: 0.5,
              springLength: 120,
              nodeDistance: 100,
            },
          },
        },
      };

      const baseOptions = {
        interaction: { hover: true, tooltipDelay: 200, selectConnectedEdges: false },
        nodes: {
          shape: 'box',
          shapeProperties: { borderRadius: 6 },
          margin: 12,
          font: { color: colorPalette.textDefault, size: 15, face: 'arial' },
          borderWidth: 2,
          color: {
            border: colorPalette.nodeBorder,
            background: colorPalette.nodeDefault,
            highlight: {
              border: colorPalette.nodeSelectedBorder,
              background: colorPalette.nodeSelected,
            },
            hover: { border: colorPalette.nodeHover, background: colorPalette.nodeHover },
          },
          shadow: { enabled: true, color: 'rgba(0,0,0,0.45)', size: 18, x: 4, y: 4 },
        },
        edges: {
          arrows: isDirected ? { to: { enabled: true, scaleFactor: 1 } } : {},
          width: 2,
          color: {
            color: colorPalette.edgeDefault,
            highlight: colorPalette.edgeSelected,
            inherit: false,
            opacity: 0.9,
          },
          smooth: { type: 'dynamic' },
        },
      };

      // ----- Network creation ----- //
      function createNetwork(layoutType) {
        const options = { ...baseOptions, ...layoutConfigs[layoutType] };
        if (network) network.destroy();
        network = new vis.Network(container, data, options);
        network.on('click', handleNodeClick);
        network.on('hoverNode', handleNodeHover);
        network.on('blurNode', handleNodeBlur);
        network.on('stabilizationIterationsDone', updateStats);
        updateStats();
      }

      function setLayout(layoutType) {
        currentLayout = layoutType;
        document
          .querySelectorAll('.layout-controls button')
          .forEach((btn) => btn.classList.remove('active'));
        document.getElementById(`${layoutType}-btn`).classList.add('active');
        createNetwork(layoutType);
      }

      // ----- Click / Info ----- //
      function handleNodeClick(params) {
        resetColors();
        hideConnectedNodes();

        if (params.nodes.length > 0) {
          const selectedNodeId = params.nodes[0];
          nodes.update({
            id: selectedNodeId,
            color: {
              background: colorPalette.nodeSelected,
              border: colorPalette.nodeSelectedBorder,
            },
          });

          const connectedEdges = network.getConnectedEdges(selectedNodeId);
          edges.update(
            connectedEdges.map((edgeId) => ({
              id: edgeId,
              color: { color: colorPalette.edgeSelected },
            }))
          );

          const connectedNodes = network.getConnectedNodes(selectedNodeId);
          nodes.update(
            connectedNodes.map((nodeId) => ({
              id: nodeId,
              color: {
                background: colorPalette.nodeHighlighted,
                border: colorPalette.nodeHighlightedBorder,
              },
            }))
          );

          showNodeInfo(nodes.get(selectedNodeId));
          showConnectedNodes(selectedNodeId, connectedNodes);
        } else {
          hideNodeInfo();
          hideConnectedNodes();
        }
      }

      function showNodeInfo(nodeData) {
        const infoDiv = document.getElementById('node-info');
        const detailsDiv = document.getElementById('node-details');
        const connections = network.getConnectedEdges(nodeData.id).length;
        detailsDiv.innerHTML =
          createStatRow('Label', nodeData.label) +
          createStatRow('Address', createAddressChip(nodeData.id)) +
          createStatRow('Connections', connections);
        infoDiv.style.display = 'block';
      }

      function showConnectedNodes(selectedNodeId, connectedNodeIds) {
        const connectedDiv = document.getElementById('connected-nodes');
        const listDiv = document.getElementById('connected-list');

        if (connectedNodeIds.length === 0) {
          listDiv.innerHTML = `<em class="hint-text">No connected nodes</em>`;
        } else {
          listDiv.innerHTML = connectedNodeIds
            .map((id) => {
              const node = nodes.get(id);
              return node ? createNodeChip('→', node.label, createAddressChip(node.id)) : '';
            })
            .join('');
        }
        connectedDiv.style.display = 'block';
      }

      function hideConnectedNodes() {
        const el = document.getElementById('connected-nodes');
        if (el) el.style.display = 'none';
      }

      // ----- Statistics ----- //
      function updateStats() {
        const statsDiv = document.getElementById('graph-stats');
        const nodeCount = nodes.length;
        const edgeCount = edges.length;
        const avgDegree = nodeCount > 0 ? ((2 * edgeCount) / nodeCount).toFixed(2) : '0.00';
        statsDiv.innerHTML =
          createStatRow('Nodes', nodeCount) +
          createStatRow('Edges', edgeCount) +
          createStatRow('Avg Degree', avgDegree) +
          createStatRow('Mode', isDirected ? 'Directed' : 'Undirected') +
          createStatRow('Layout', currentLayout);
      }

      // ----- JSON export ----- //
      function customExportJSON() {
        exportJSON(
          {
            nodes: nodes.get(),
            edges: edges.get(),
            directed: isDirected,
            layout: currentLayout,
            timestamp: new Date().toISOString(),
          },
          'graph-data.json'
        );
      }

      // ----- Init ----- //
      createNetwork(currentLayout);
    </script>
  </body>
</html>
