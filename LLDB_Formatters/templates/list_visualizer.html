<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pretty LLDB — List Visualizer</title>
    <style>
      __SHARED_CSS__ body {
        padding: 0;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <button
      id="toggle-info-btn"
      onclick="toggleInfoBox()"
      title="Show Info Panel"
      aria-label="Toggle list controls"
    >
      ⚙
    </button>

    <div id="info-box" class="hidden" role="complementary" aria-label="List controls">
      <!-- Gradient accent bar -->
      <div class="panel-accent panel-accent--list"></div>

      <!-- Header -->
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="panel-title">List Visualizer</span>
          <span class="panel-badge panel-badge--list">LIST</span>
        </div>
        <button id="theme-toggle-btn" class="icon-btn" onclick="toggleTheme()"></button>
      </div>

      <!-- Type info injected by Python -->
      <div class="stats-display type-info-display">__TYPE_INFO_HTML__</div>

      <!-- View Operations -->
      <div class="controls-section">
        <div class="section-title">View</div>
        <div class="button-group">
          <button id="btn-center" class="button" onclick="centerView()">Center</button>
          <button id="btn-clear" class="button" onclick="clearSelection()">Clear</button>
        </div>
      </div>

      <!-- Layout -->
      <div class="controls-section layout-controls">
        <div class="section-title">Layout</div>
        <div class="button-group">
          <button class="button active" onclick="setLayout('hierarchical')" id="hierarchical-btn">
            Horizontal
          </button>
          <button class="button" onclick="setLayout('vertical')" id="vertical-btn">Vertical</button>
          <button class="button" onclick="setLayout('radial')" id="radial-btn">Radial</button>
        </div>
      </div>

      <!-- Animation -->
      <div class="controls-section animation-controls">
        <div class="section-title">Animation</div>
        <button id="btn-play" class="button play-button" onclick="playAnimation()">
          Play Traversal
        </button>
        <div class="speed-control">
          <span>Speed</span>
          <input
            type="range"
            id="speed-slider"
            min="100"
            max="1000"
            value="400"
            step="50"
            oninput="updateSpeed(this.value)"
          />
          <span id="speed-value">400ms</span>
        </div>
        <div class="button-group">
          <button id="btn-pause" class="button" onclick="pauseAnimation()">Pause</button>
          <button id="btn-stop" class="button" onclick="stopAnimation()">Stop</button>
          <button id="btn-step" class="button" onclick="stepAnimation()">Step</button>
        </div>
      </div>

      <!-- Search -->
      <div class="controls-section search-controls">
        <div class="section-title">Search</div>
        <input
          type="text"
          class="search-box"
          id="search-input"
          placeholder="Search node values…"
          autocomplete="off"
          spellcheck="false"
          oninput="searchNodes(this.value)"
        />
        <div class="button-group" style="margin-top: 8px">
          <button class="button" onclick="clearHighlights()">Clear Search</button>
        </div>
      </div>

      <!-- Statistics -->
      <div class="stats-display" id="stats-display">
        <div class="section-title">Statistics</div>
        <div id="list-stats"></div>
      </div>

      <!-- Selected node info -->
      <div class="node-info" id="node-info" style="display: none">
        <div class="section-title">Selected Node</div>
        <div id="node-details"></div>
      </div>

      <!-- Legend -->
      <div class="legend">
        <div class="section-title">Legend</div>
        <div class="legend-item">
          <div class="legend-color" style="background: #7aa2f7"></div>
          <span>Normal</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #9ece6a"></div>
          <span>Animated</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #e0af68"></div>
          <span>Highlighted</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #f7768e"></div>
          <span>Search Result</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #f7768e; opacity: 0.6"></div>
          <span>Cycle Edge</span>
        </div>
      </div>

      <!-- Export -->
      <div class="controls-section export-controls">
        <div class="section-title">Export</div>
        <div class="button-group">
          <button id="btn-png" class="button" onclick="exportPNG()">PNG</button>
          <button id="btn-json" class="button" onclick="customExportJSON()">JSON</button>
        </div>
      </div>
    </div>
    <!-- /#info-box -->

    <div id="mynetwork"></div>

    <script type="text/javascript">
      __VISJS_LIBRARY__;
    </script>
    <script type="text/javascript">
      __SHARED_JS__;
    </script>
    <script type="text/javascript">
      // ----- Data from Python ----- //
      const rawNodesData = __NODES_DATA__;
      const rawEdgesData = __EDGES_DATA__;
      const traversalOrder = __TRAVERSAL_ORDER_DATA__;
      const isDoublyLinked = __IS_DOUBLY_LINKED__;
      const cycleDetected = __CYCLE_DETECTED__;

      // ----- State ----- //
      let network;
      let currentLayout = 'hierarchical';
      let animationState = {
        isPlaying: false,
        isPaused: false,
        currentStep: 0,
        timeouts: [],
        speed: 400,
      };

      // ----- Process data into vis.js format ----- //
      const processedNodes = rawNodesData.map((node) => ({
        id: node.id,
        label: String(node.value || node.label),
        address: String(node.address || node.id),
      }));

      const processedEdges = rawEdgesData.map((edge) => {
        const isPrev = edge.kind === 'prev';
        const isCycle = edge.kind === 'cycle';
        return {
          ...edge,
          arrows: { to: { enabled: true, scaleFactor: isPrev ? 0.75 : 1 } },
          dashes: isPrev,
          width: isCycle ? 3 : 2,
          color: {
            color: isCycle
              ? colorPalette.red
              : isPrev
                ? colorPalette.edgeSelected
                : colorPalette.edgeDefault,
            highlight: isCycle
              ? colorPalette.red
              : isPrev
                ? colorPalette.edgeSelected
                : colorPalette.edgeSelected,
            inherit: false,
          },
          smooth: isCycle
            ? { type: 'curvedCW', roundness: 0.35 }
            : isPrev
              ? { type: 'curvedCCW', roundness: 0.2 }
              : false,
        };
      });

      const nodes = new vis.DataSet(processedNodes);
      const edges = new vis.DataSet(processedEdges);
      const data = { nodes, edges };
      const container = document.getElementById('mynetwork');

      // ----- Layout configurations ----- //
      const layoutConfigs = {
        hierarchical: {
          layout: {
            hierarchical: {
              enabled: true,
              direction: 'LR',
              sortMethod: 'directed',
              nodeSpacing: 100,
              levelSeparation: 150,
            },
          },
          physics: { enabled: false },
        },
        vertical: {
          layout: {
            hierarchical: {
              enabled: true,
              direction: 'UD',
              sortMethod: 'directed',
              nodeSpacing: 100,
              levelSeparation: 120,
            },
          },
          physics: { enabled: false },
        },
        radial: {
          layout: { randomSeed: 2 },
          physics: {
            enabled: true,
            barnesHut: { gravitationalConstant: -5000, centralGravity: 0.25, springLength: 120 },
          },
        },
      };

      const baseOptions = {
        interaction: { hover: true, tooltipDelay: 200, selectConnectedEdges: false },
        nodes: {
          shape: 'box',
          shapeProperties: { borderRadius: 6 },
          margin: 12,
          font: { color: colorPalette.textDefault, size: 15, face: 'arial' },
          borderWidth: 2,
          color: {
            border: colorPalette.nodeBorder,
            background: colorPalette.nodeDefault,
            highlight: {
              border: colorPalette.nodeSelectedBorder,
              background: colorPalette.nodeSelected,
            },
            hover: { border: colorPalette.nodeHover, background: colorPalette.nodeHover },
          },
          shadow: { enabled: true, color: 'rgba(0,0,0,0.45)', size: 18, x: 4, y: 4 },
        },
        edges: {
          width: 2,
          color: {
            color: colorPalette.edgeDefault,
            highlight: colorPalette.edgeSelected,
            inherit: false,
          },
          smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 },
        },
      };

      // ----- Network creation ----- //
      function createNetwork(layoutType) {
        const options = { ...baseOptions, ...layoutConfigs[layoutType] };
        if (network) network.destroy();
        network = new vis.Network(container, data, options);
        network.on('click', handleNodeClick);
        network.on('hoverNode', handleNodeHover);
        network.on('blurNode', handleNodeBlur);
        network.on('stabilizationIterationsDone', updateStats);
        updateStats();
      }

      function setLayout(layoutType) {
        currentLayout = layoutType;
        document
          .querySelectorAll('.layout-controls button')
          .forEach((btn) => btn.classList.remove('active'));
        document.getElementById(`${layoutType}-btn`).classList.add('active');
        createNetwork(layoutType);
      }

      // ----- Animation ----- //
      function updateSpeed(value) {
        animationState.speed = parseInt(value, 10);
        document.getElementById('speed-value').textContent = `${animationState.speed}ms`;
      }

      function playAnimation() {
        if (!traversalOrder || traversalOrder.length === 0) return;
        if (animationState.isPlaying) return;
        if (animationState.isPaused) {
          resumeAnimation();
          return;
        }

        stopAnimation();
        animationState.isPlaying = true;
        const playBtn = document.getElementById('btn-play');
        if (playBtn) playBtn.innerHTML = `<span class="button-icon">${svgIcons.pause}</span> Pause`;

        const animateStep = (index) => {
          if (!animationState.isPlaying || index >= traversalOrder.length) {
            if (index >= traversalOrder.length) stopAnimation();
            return;
          }
          nodes.update({
            id: traversalOrder[index],
            color: {
              background: colorPalette.nodeAnimated,
              border: colorPalette.nodeAnimatedBorder,
            },
          });
          if (index > 0) {
            nodes.update({
              id: traversalOrder[index - 1],
              color: { background: colorPalette.nodeDefault, border: colorPalette.nodeBorder },
            });
          }
          animationState.currentStep = index;
          animationState.timeouts.push(
            setTimeout(() => animateStep(index + 1), animationState.speed)
          );
        };
        animateStep(0);
      }

      function pauseAnimation() {
        if (!animationState.isPlaying) return;
        animationState.isPaused = true;
        animationState.isPlaying = false;
        animationState.timeouts.forEach(clearTimeout);
        animationState.timeouts = [];
        const playBtn = document.getElementById('btn-play');
        if (playBtn) playBtn.innerHTML = `<span class="button-icon">${svgIcons.play}</span> Resume`;
      }

      function resumeAnimation() {
        if (!traversalOrder || traversalOrder.length === 0) return;
        animationState.isPaused = false;
        animationState.isPlaying = true;
        const playBtn = document.getElementById('btn-play');
        if (playBtn) playBtn.innerHTML = `<span class="button-icon">${svgIcons.pause}</span> Pause`;
        playAnimationFromStep(animationState.currentStep + 1);
      }

      function playAnimationFromStep(startIndex) {
        const animateStep = (index) => {
          if (!animationState.isPlaying || index >= traversalOrder.length) {
            if (index >= traversalOrder.length) stopAnimation();
            return;
          }
          nodes.update({
            id: traversalOrder[index],
            color: {
              background: colorPalette.nodeAnimated,
              border: colorPalette.nodeAnimatedBorder,
            },
          });
          if (index > 0) {
            nodes.update({
              id: traversalOrder[index - 1],
              color: { background: colorPalette.nodeDefault, border: colorPalette.nodeBorder },
            });
          }
          animationState.currentStep = index;
          animationState.timeouts.push(
            setTimeout(() => animateStep(index + 1), animationState.speed)
          );
        };
        animateStep(startIndex);
      }

      function stopAnimation() {
        animationState.isPlaying = false;
        animationState.isPaused = false;
        animationState.timeouts.forEach(clearTimeout);
        animationState.timeouts = [];
        animationState.currentStep = 0;
        resetColors();
        const playBtn = document.getElementById('btn-play');
        if (playBtn)
          playBtn.innerHTML = `<span class="button-icon">${svgIcons.play}</span> Play Traversal`;
      }

      function stepAnimation() {
        if (!traversalOrder || traversalOrder.length === 0) return;
        if (animationState.isPlaying || animationState.isPaused) return;
        resetColors();
        if (animationState.currentStep >= traversalOrder.length) animationState.currentStep = 0;
        nodes.update({
          id: traversalOrder[animationState.currentStep],
          color: { background: colorPalette.nodeAnimated, border: colorPalette.nodeAnimatedBorder },
        });
        animationState.currentStep++;
      }

      // ----- Click / Info ----- //
      function handleNodeClick(params) {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];
          network.setSelection({ nodes: [nodeId] });
          showNodeInfo(nodes.get(nodeId));
        } else {
          hideNodeInfo();
        }
      }

      function showNodeInfo(nodeData) {
        const infoDiv = document.getElementById('node-info');
        const detailsDiv = document.getElementById('node-details');
        detailsDiv.innerHTML =
          createStatRow('Value', nodeData.label) +
          createStatRow('Address', createAddressChip(nodeData.address));
        infoDiv.style.display = 'block';
      }

      // ----- Statistics ----- //
      function updateStats() {
        const statsDiv = document.getElementById('list-stats');
        const nodeCount = nodes.length;
        const listType = isDoublyLinked ? 'Doubly Linked' : 'Singly Linked';
        const nextEdges = rawEdgesData.filter((e) => e.kind === 'next').length;
        const prevEdges = rawEdgesData.filter((e) => e.kind === 'prev').length;
        const cycleEdges = rawEdgesData.filter((e) => e.kind === 'cycle').length;
        const cycleVal = cycleDetected ? `Yes${cycleEdges ? ` (${cycleEdges})` : ''}` : 'No';
        statsDiv.innerHTML =
          createStatRow('Nodes', nodeCount) +
          createStatRow('Type', listType) +
          createStatRow('Next Edges', nextEdges) +
          createStatRow('Prev Edges', prevEdges) +
          createStatRow('Cycle', cycleVal) +
          createStatRow('Layout', currentLayout);
      }

      // ----- JSON export ----- //
      function customExportJSON() {
        exportJSON(
          {
            nodes: nodes.get(),
            edges: edges.get(),
            traversalOrder: traversalOrder,
            isDoublyLinked: isDoublyLinked,
            cycleDetected: cycleDetected,
            layout: currentLayout,
            timestamp: new Date().toISOString(),
          },
          'list-data.json'
        );
      }

      // ----- Init ----- //
      createNetwork(currentLayout);
    </script>
  </body>
</html>
