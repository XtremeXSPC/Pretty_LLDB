<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pretty LLDB — Tree Visualizer</title>
    <style>
      __SHARED_CSS__ body {
        padding: 0;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <button
      id="toggle-info-btn"
      onclick="toggleInfoBox()"
      title="Show Info Panel"
      aria-label="Toggle tree controls"
    >
      ⚙
    </button>

    <div id="info-box" class="hidden" role="complementary" aria-label="Tree controls">
      <!-- Gradient accent bar -->
      <div class="panel-accent panel-accent--tree"></div>

      <!-- Header -->
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="panel-title">Tree Visualizer</span>
          <span class="panel-badge panel-badge--tree">TREE</span>
        </div>
        <button id="theme-toggle-btn" class="icon-btn" onclick="toggleTheme()"></button>
      </div>

      <!-- Type info injected by Python -->
      <div class="stats-display type-info-display">__TYPE_INFO_HTML__</div>

      <!-- Tree Operations -->
      <div class="controls-section">
        <div class="section-title">Tree</div>
        <div class="button-group">
          <button id="btn-expand" class="button" onclick="expandAll()">Expand All</button>
          <button id="btn-collapse" class="button" onclick="collapseAll()">Collapse</button>
        </div>
        <div class="button-group">
          <button id="btn-center" class="button" onclick="centerView()">Center</button>
          <button id="btn-clear" class="button" onclick="clearSelection()">Clear</button>
        </div>
      </div>

      <!-- Layout -->
      <div class="controls-section layout-controls">
        <div class="section-title">Layout</div>
        <div class="button-group">
          <button class="button active" onclick="setLayout('hierarchical')" id="hierarchical-btn">
            Top-Down
          </button>
          <button class="button" onclick="setLayout('radial')" id="radial-btn">Radial</button>
          <button class="button" onclick="setLayout('physics')" id="physics-btn">Physics</button>
        </div>
      </div>

      <!-- Search -->
      <div class="controls-section search-controls">
        <div class="section-title">Search</div>
        <input
          type="text"
          class="search-box"
          id="search-input"
          placeholder="Search node values…"
          autocomplete="off"
          spellcheck="false"
          oninput="searchNodes(this.value)"
        />
        <div class="button-group" style="margin-top: 8px">
          <button class="button" onclick="clearHighlights()">Clear Search</button>
        </div>
      </div>

      <!-- Statistics -->
      <div class="stats-display" id="stats-display">
        <div class="section-title">Statistics</div>
        <div id="tree-stats"></div>
      </div>

      <!-- Selected node info -->
      <div class="node-info" id="node-info" style="display: none">
        <div class="section-title">Selected Node</div>
        <div id="node-details"></div>
      </div>

      <!-- Parent/child relations -->
      <div class="connected-nodes" id="connected-nodes" style="display: none">
        <div class="section-title">Relations</div>
        <div id="connected-list"></div>
      </div>

      <!-- Legend -->
      <div class="legend">
        <div class="section-title">Legend</div>
        <div class="legend-item">
          <div class="legend-color" style="background: #7aa2f7"></div>
          <span>Normal</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #bb9af7"></div>
          <span>Selected</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #f7768e"></div>
          <span>Search</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #e0af68"></div>
          <span>Connected</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #565f89"></div>
          <span>Collapsed</span>
        </div>
      </div>

      <!-- Export -->
      <div class="controls-section export-controls">
        <div class="section-title">Export</div>
        <div class="button-group">
          <button id="btn-png" class="button" onclick="exportPNG()">PNG</button>
          <button id="btn-json" class="button" onclick="customExportJSON()">JSON</button>
        </div>
      </div>
    </div>
    <!-- /#info-box -->

    <div id="mynetwork"></div>

    <script type="text/javascript">
      __VISJS_LIBRARY__;
    </script>
    <script type="text/javascript">
      __SHARED_JS__;
    </script>
    <script type="text/javascript">
      // ----- Data from Python ----- //
      const rawNodesData = __NODES_DATA__;
      const rawEdgesData = __EDGES_DATA__;

      // ----- State ----- //
      let network;
      let currentLayout = 'hierarchical';
      let originalNodes = new vis.DataSet();
      let originalEdges = new vis.DataSet();
      let collapsedNodes = new Set();

      const processedNodes = rawNodesData.map((node) => ({
        id: node.id,
        label: String(node.label),
        title: node.title,
        originalData: node,
      }));

      const nodes = new vis.DataSet(processedNodes);
      const edges = new vis.DataSet(rawEdgesData);
      const data = { nodes, edges };
      const container = document.getElementById('mynetwork');

      originalNodes.update(processedNodes);
      originalEdges.update(rawEdgesData);

      // ----- Layout configurations ----- //
      const layoutConfigs = {
        hierarchical: {
          layout: {
            hierarchical: {
              enabled: true,
              sortMethod: 'directed',
              direction: 'UD',
              nodeSpacing: 120,
              levelSeparation: 100,
            },
          },
          physics: { enabled: false },
        },
        radial: {
          layout: { randomSeed: 2 },
          physics: {
            solver: 'hierarchicalRepulsion',
            hierarchicalRepulsion: {
              centralGravity: 0.0,
              springLength: 150,
              springConstant: 0.01,
              nodeDistance: 100,
            },
          },
        },
        physics: {
          layout: { randomSeed: 2 },
          physics: {
            enabled: true,
            barnesHut: {
              gravitationalConstant: -5000,
              centralGravity: 0.3,
              springLength: 95,
              nodeDistance: 100,
              damping: 0.09,
            },
          },
        },
      };

      const baseOptions = {
        interaction: {
          dragNodes: true,
          zoomView: true,
          dragView: true,
          hover: true,
          tooltipDelay: 200,
          selectConnectedEdges: false,
          navigationButtons: false,
        },
        nodes: {
          shape: 'box',
          shapeProperties: { borderRadius: 6 },
          margin: 12,
          font: { color: colorPalette.textDefault, size: 15, face: 'arial' },
          borderWidth: 2,
          color: {
            border: colorPalette.nodeBorder,
            background: colorPalette.nodeDefault,
            highlight: {
              border: colorPalette.nodeSelectedBorder,
              background: colorPalette.nodeSelected,
            },
            hover: { border: colorPalette.nodeHover, background: colorPalette.nodeHover },
          },
          shadow: { enabled: true, color: 'rgba(0,0,0,0.45)', size: 18, x: 4, y: 4 },
        },
        edges: {
          arrows: { to: { enabled: true, scaleFactor: 0.8 } },
          width: 2,
          color: {
            color: colorPalette.edgeDefault,
            highlight: colorPalette.edgeSelected,
            inherit: false,
            opacity: 0.9,
          },
          smooth: {
            enabled: true,
            type: 'cubicBezier',
            forceDirection: 'vertical',
            roundness: 0.4,
          },
        },
      };

      // ----- Network creation ----- //
      function createNetwork(layoutType) {
        const options = { ...baseOptions, ...layoutConfigs[layoutType] };
        if (network) network.destroy();
        network = new vis.Network(container, data, options);
        network.on('click', handleNodeClick);
        network.on('doubleClick', handleNodeDoubleClick);
        network.on('hoverNode', handleNodeHover);
        network.on('blurNode', handleNodeBlur);
        network.on('stabilizationIterationsDone', updateStats);
        updateStats();
      }

      function setLayout(layoutType) {
        currentLayout = layoutType;
        document
          .querySelectorAll('.layout-controls button')
          .forEach((btn) => btn.classList.remove('active'));
        document.getElementById(`${layoutType}-btn`).classList.add('active');
        createNetwork(layoutType);
      }

      // ----- Expand / Collapse ----- //
      function expandAll() {
        collapsedNodes.clear();
        nodes.clear();
        edges.clear();
        nodes.update(originalNodes.get());
        edges.update(originalEdges.get());
        resetColors();
        updateStats();
        if (network) setTimeout(() => network.fit(), 100);
      }

      function collapseAll() {
        const allNodes = originalNodes.get();
        const allEdges = originalEdges.get();
        const nodesWithParents = new Set(allEdges.map((e) => e.to));
        const rootNodes = allNodes.filter((n) => !nodesWithParents.has(n.id));

        collapsedNodes.clear();
        rootNodes.forEach((rootNode) => {
          getChildrenOfNode(rootNode.id).forEach((childId) => {
            getAllDescendants(childId).forEach((id) => collapsedNodes.add(id));
          });
        });

        updateVisibleNodesAndEdges();
        updateStats();
        if (network) setTimeout(() => network.fit(), 100);
      }

      function toggleNodeCollapse(nodeId) {
        collapsedNodes.has(nodeId) ? expandNode(nodeId) : collapseNode(nodeId);
        updateVisibleNodesAndEdges();
        updateStats();
      }

      function expandNode(nodeId) {
        collapsedNodes.delete(nodeId);
        getChildrenOfNode(nodeId).forEach((id) => collapsedNodes.delete(id));
      }

      function collapseNode(nodeId) {
        getAllDescendants(nodeId).forEach((id) => collapsedNodes.add(id));
      }

      function getChildrenOfNode(nodeId) {
        return originalEdges.get({ filter: (e) => e.from === nodeId }).map((e) => e.to);
      }

      function getAllDescendants(nodeId) {
        const children = getChildrenOfNode(nodeId);
        return children.flatMap((childId) => [childId, ...getAllDescendants(childId)]);
      }

      function updateVisibleNodesAndEdges() {
        const visibleNodes = originalNodes.get().filter((n) => !collapsedNodes.has(n.id));
        const visibleEdges = originalEdges
          .get()
          .filter((e) => !collapsedNodes.has(e.from) && !collapsedNodes.has(e.to));
        nodes.clear();
        edges.clear();
        nodes.update(visibleNodes);
        edges.update(visibleEdges);
        updateCollapsedIndicators();
      }

      function updateCollapsedIndicators() {
        const updates = nodes.get().map((node) => {
          const hasCollapsed = getChildrenOfNode(node.id).some((id) => collapsedNodes.has(id));
          if (hasCollapsed) {
            return {
              id: node.id,
              color: { background: colorPalette.nodeBorder, border: colorPalette.nodeDefault },
              label: node.label.replace(' [+]', '') + ' [+]',
            };
          }
          return {
            id: node.id,
            color: { background: colorPalette.nodeDefault, border: colorPalette.nodeBorder },
            label: node.originalData
              ? String(node.originalData.label)
              : node.label.replace(' [+]', ''),
          };
        });
        if (updates.length > 0) nodes.update(updates);
      }

      // ----- Click / Info ----- //
      function handleNodeClick(params) {
        resetColors();
        hideConnectedNodes();

        if (params.nodes.length > 0) {
          const selectedNodeId = params.nodes[0];
          nodes.update({
            id: selectedNodeId,
            color: {
              background: colorPalette.nodeSelected,
              border: colorPalette.nodeSelectedBorder,
            },
          });

          const connectedEdges = network.getConnectedEdges(selectedNodeId);
          edges.update(
            connectedEdges.map((edgeId) => ({
              id: edgeId,
              color: { color: colorPalette.edgeSelected },
            }))
          );

          const connectedNodes = network.getConnectedNodes(selectedNodeId);
          nodes.update(
            connectedNodes.map((nodeId) => ({
              id: nodeId,
              color: {
                background: colorPalette.nodeHighlighted,
                border: colorPalette.nodeHighlightedBorder,
              },
            }))
          );

          showNodeInfo(nodes.get(selectedNodeId));
          showConnectedNodes(selectedNodeId);
        } else {
          hideNodeInfo();
          hideConnectedNodes();
        }
      }

      function handleNodeDoubleClick(params) {
        if (params.nodes.length > 0) toggleNodeCollapse(params.nodes[0]);
      }

      function showNodeInfo(nodeData) {
        const infoDiv = document.getElementById('node-info');
        const detailsDiv = document.getElementById('node-details');
        const allEdges = originalEdges.get();
        const children = allEdges.filter((e) => e.from === nodeData.id).length;
        const parents = allEdges.filter((e) => e.to === nodeData.id).length;

        const isCollapsed = collapsedNodes.has(nodeData.id);
        const hasCollapsedKids = getChildrenOfNode(nodeData.id).some((id) =>
          collapsedNodes.has(id)
        );
        const status = isCollapsed
          ? 'Collapsed'
          : hasCollapsedKids
            ? 'Has hidden children'
            : 'Visible';

        const cleanLabel = nodeData.label.replace(' [+]', '');
        const addr = nodeData.originalData ? nodeData.originalData.address : nodeData.id;

        detailsDiv.innerHTML =
          createStatRow('Label', cleanLabel) +
          createStatRow('Address', createAddressChip(addr)) +
          createStatRow('Children', children) +
          createStatRow('Parents', parents) +
          createStatRow('Status', status) +
          `<div class="hint-text">Double-click to toggle collapse</div>`;
        infoDiv.style.display = 'block';
      }

      function showConnectedNodes(selectedNodeId) {
        const connectedDiv = document.getElementById('connected-nodes');
        const listDiv = document.getElementById('connected-list');
        const allEdges = originalEdges.get();

        const parentEdges = allEdges.filter((e) => e.to === selectedNodeId);
        const childEdges = allEdges.filter((e) => e.from === selectedNodeId);

        let html = '';

        if (parentEdges.length > 0) {
          html += `<div class="rel-group-label">Parents</div>`;
          parentEdges.forEach((edge) => {
            const pNode = originalNodes.get(edge.from);
            const label = pNode ? pNode.label.replace(' [+]', '') : edge.from;
            html += createNodeChip('↑', label);
          });
        }

        if (childEdges.length > 0) {
          if (html) html += `<div style="margin-top:8px"></div>`;
          html += `<div class="rel-group-label">Children</div>`;
          childEdges.forEach((edge) => {
            const cNode = originalNodes.get(edge.to);
            const label = cNode ? cNode.label.replace(' [+]', '') : edge.to;
            const isCollapsed = cNode ? collapsedNodes.has(cNode.id) : false;
            const extra = isCollapsed ? `<span class="collapsed-badge">Collapsed</span>` : '';
            html += createNodeChip('↓', label, extra);
          });
        }

        if (!html) html = `<em class="hint-text">No parent or child nodes</em>`;
        listDiv.innerHTML = html;
        connectedDiv.style.display = 'block';
      }

      function hideConnectedNodes() {
        const el = document.getElementById('connected-nodes');
        if (el) el.style.display = 'none';
      }

      // ----- Statistics ----- //
      function updateStats() {
        const statsDiv = document.getElementById('tree-stats');
        const visibleNodes = nodes.get();
        const visibleEdges = edges.get();
        const totalNodes = originalNodes.length;
        const totalEdges = originalEdges.length;
        const nodeCount = visibleNodes.length;
        const edgeCount = visibleEdges.length;
        const collapsedCount = collapsedNodes.size;

        const allFromNodes = new Set(visibleEdges.map((e) => e.from));
        const allToNodes = new Set(visibleEdges.map((e) => e.to));
        const rootNodes = visibleNodes.filter((n) => !allToNodes.has(n.id)).length;
        const leafNodes = visibleNodes.filter((n) => !allFromNodes.has(n.id)).length;
        const avgBranching =
          nodeCount - rootNodes > 0
            ? (edgeCount / Math.max(1, nodeCount - leafNodes)).toFixed(2)
            : '0.00';

        statsDiv.innerHTML =
          createStatRow('Nodes', `${nodeCount} / ${totalNodes}`) +
          createStatRow('Edges', `${edgeCount} / ${totalEdges}`) +
          createStatRow('Collapsed', collapsedCount) +
          createStatRow('Root Nodes', rootNodes) +
          createStatRow('Leaf Nodes', leafNodes) +
          createStatRow('Avg Branching', avgBranching) +
          createStatRow('Layout', currentLayout);
      }

      // ----- JSON export ----- //
      function customExportJSON() {
        exportJSON(
          {
            nodes: originalNodes.get(),
            edges: originalEdges.get(),
            visibleNodes: nodes.get(),
            visibleEdges: edges.get(),
            collapsedNodes: Array.from(collapsedNodes),
            layout: currentLayout,
            timestamp: new Date().toISOString(),
          },
          'tree-data.json'
        );
      }

      // ----- Init ----- //
      createNetwork(currentLayout);
    </script>
  </body>
</html>
